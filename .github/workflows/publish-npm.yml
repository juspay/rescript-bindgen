name: Publish to npm

# Publishes when you push a version tag, e.g.:
#   npm version patch                     # 1.0.1        -> dist-tag `latest`
#   npm version prerelease --preid=beta   # 1.0.1-beta.0 -> dist-tag `beta`
#   git push --follow-tags                # pushes the commit AND the tag -> triggers this
# The npm dist-tag is derived from the version: a prerelease (`-beta.`, `-rc.`, …)
# publishes under that pre-id so it never displaces `latest`.
on:
  push:
    tags: ['v*']

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm OIDC trusted publishing
    steps:
      - uses: actions/checkout@v7

      # Node 24 ships npm >= 11.5.1, the floor for OIDC trusted publishing.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Ensure npm supports OIDC
        run: npm --version

      - run: npm ci

      - name: Smoke test
        run: npm test

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag $TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Publishing version $PKG"

      # Derive the npm dist-tag from the version. A prerelease (`1.2.3-beta.0`)
      # publishes under its pre-id (`beta`) so it never becomes the default `latest`;
      # a plain release (`1.2.3`) goes to `latest`.
      - name: Determine npm dist-tag
        run: |
          PKG=$(node -p "require('./package.json').version")
          if [[ "$PKG" == *-* ]]; then
            PRE="${PKG#*-}"            # 1.2.3-beta.0 -> beta.0
            DIST_TAG="${PRE%%.*}"      # beta.0       -> beta
          else
            DIST_TAG="latest"
          fi
          echo "DIST_TAG=$DIST_TAG" >> "$GITHUB_ENV"
          echo "version $PKG -> npm dist-tag '$DIST_TAG'"

      # OIDC trusted publishing — no NPM_TOKEN. Configure a trusted publisher on
      # npmjs.com for this package pointing at this repo + publish-npm.yml.
      - name: Publish
        run: npm publish --access public --provenance --tag "$DIST_TAG"
