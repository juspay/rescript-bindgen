name: Claude Auto Review

# Claude reviews every PR diff and posts review comments.
# Requires repo secret: ANTHROPIC_API_KEY (from console.anthropic.com).
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Review PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-opus-4-8
            --max-turns 6
          prompt: |
            Review this pull request for a deterministic TypeScript -> ReScript
            binding generator. Focus on:
            - Correctness of the TS-type -> ReScript mapping (see README.md and types.d.ts)
            - That generated output stays type-safe: NO `%identity`, `@unwrap`, or `Obj.magic`;
              multi-type props must use `@unboxed` untagged variants
            - Whether unmappable types are flagged (defect / review) rather than silently emitted
            - Bugs, edge cases, and missing test coverage in `test/smoke.mjs`
            Keep findings concrete and reference file:line. Be concise.
